<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Saku Khatib</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#065f46">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-emerald-50 min-h-screen flex flex-col items-center p-4 font-serif">

    <main class="w-full max-w-md bg-white shadow-2xl rounded-xl overflow-hidden mt-4 border-t-8 border-emerald-800">
        
        <header class="bg-emerald-900 text-white text-center py-6 px-4">
            <h1 class="text-2xl font-bold tracking-wider">BUKU SAKU KHATIB</h1>
            <p class="text-emerald-200 text-sm mt-1 font-sans">Generator Khutbah AI Offline</p>
        </header>

        <div class="p-6">
            <div class="mb-5">
                <label for="temaKhutbah" class="block text-emerald-900 font-semibold mb-2">Tema Khutbah:</label>
                <input type="text" id="temaKhutbah" 
                    class="w-full p-3 border border-emerald-200 rounded-lg focus:ring-2 focus:ring-emerald-600 outline-none font-sans" 
                    placeholder="Contoh: Sabar menghadapi cobaan, Keutamaan sedekah...">
            </div>

            <button id="generateBtn" 
                class="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-3 rounded-lg transition-colors shadow-md flex justify-center items-center gap-2 font-sans">
                <span>Susun Khutbah (Mulai Unduh AI)</span>
            </button>

            <div id="loadingIndicator" class="hidden mt-6 p-4 bg-emerald-100 rounded-lg border border-emerald-200 text-center text-emerald-800 font-sans text-sm">
                <span class="animate-pulse font-bold block mb-2 text-base">Mesin AI Sedang Diproses...</span>
                Jika ini pertama kalinya Anda klik tombol ini, Chrome sedang mendownload model AI (~2GB) di latar belakang. Proses ini bisa memakan waktu hingga 15 menit. <b>Mohon jangan tutup halaman ini.</b>
            </div>

            <div id="hasilKhutbahContainer" class="hidden mt-6 border-t border-emerald-100 pt-6">
                <h2 class="text-emerald-800 font-bold mb-3 text-center border-b pb-2">Status / Hasil Khutbah</h2>
                <div id="hasilKhutbah" class="text-slate-800 leading-relaxed whitespace-pre-wrap text-sm md:text-base">
                    </div>
            </div>
        </div>
    </main>

    <script>
        // ==========================================
        // LOGIKA PENGGERAK AI (Bebas Kunci)
        // ==========================================
        const generateBtn = document.getElementById('generateBtn');
        const temaKhutbah = document.getElementById('temaKhutbah');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const hasilKhutbahContainer = document.getElementById('hasilKhutbahContainer');
        const hasilKhutbah = document.getElementById('hasilKhutbah');

        generateBtn.addEventListener('click', async () => {
            const tema = temaKhutbah.value.trim();
            if (!tema) {
                alert("Harap masukkan tema khutbah terlebih dahulu.");
                return;
            }

            // Ubah tampilan saat memproses
            generateBtn.disabled = true;
            generateBtn.classList.add('opacity-50', 'cursor-not-allowed');
            loadingIndicator.classList.remove('hidden');
            hasilKhutbahContainer.classList.add('hidden');
            hasilKhutbah.innerHTML = "";

            try {
                let aiModel;
                
                // Cek secara paksa semua jalan masuk AI yang ada di browser Anda
                if (window.ai && window.ai.languageModel) {
                    aiModel = await window.ai.languageModel.create({ systemPrompt: "Anda adalah asisten pembuat teks khutbah Jumat." });
                } else if (typeof LanguageModel !== 'undefined' && LanguageModel.create) {
                    aiModel = await LanguageModel.create({ systemPrompt: "Anda adalah asisten pembuat teks khutbah Jumat." });
                } else if (window.ai && window.ai.createTextSession) {
                    aiModel = await window.ai.createTextSession();
                } else {
                    throw new Error("Mesin AI gagal diakses. Pastikan pengaturan flags sudah benar-benar disimpan.");
                }
                
                // Minta AI membuat teks
                const promptUser = `Buatkan khutbah Jumat singkat dengan tema: ${tema}. Terdiri dari mukadimah, isi, dan kesimpulan.`;
                const responsAI = await aiModel.prompt(promptUser);
                
                // Tampilkan hasil
                hasilKhutbah.innerText = responsAI;
                hasilKhutbahContainer.classList.remove('hidden');

            } catch (error) {
                // Tampilkan error dengan jelas ke layar agar kita tahu penyebabnya
                console.error("Laporan Error AI:", error);
                hasilKhutbah.innerHTML = `
                    <span style="color:#dc2626; font-weight:bold;">Terdapat Kendala Saat Memulai AI:</span><br><br>
                    <span style="font-family:monospace; background:#f1f5f9; padding:4px; border-radius:4px; font-size:12px;">${error.message}</span><br><br>
                    <span style="color:#64748b; font-size:13px;">Silakan cek tab <b style="color:#334155;">chrome://components</b> untuk memantau apakah baris <b>Optimization Guide</b> masih berstatus <i>Downloading</i>. Jika ya, tunggu sampai selesai lalu klik tombol ini lagi.</span>`;
                hasilKhutbahContainer.classList.remove('hidden');
            } finally {
                // Kembalikan tombol seperti semula
                generateBtn.disabled = false;
                generateBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                loadingIndicator.classList.add('hidden');
            }
        });

        // ==========================================
        // PENDAFTARAN SERVICE WORKER (PWA)
        // ==========================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('Gagal mendaftar sw.js', err));
            });
        }
    </script>
</body>
</html>
