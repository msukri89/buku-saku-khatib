<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Saku Khatib</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-emerald-50 min-h-screen p-4 font-serif">
    <main class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg border-t-8 border-emerald-800">
        <h1 class="text-xl font-bold text-center text-emerald-900 mb-4">BUKU SAKU KHATIB</h1>
        <input type="text" id="tema" class="w-full p-3 border rounded-lg mb-4" placeholder="Tema khutbah...">
        <button id="btn" class="w-full bg-emerald-700 text-white p-3 rounded-lg font-bold">Susun Khutbah</button>
        <div id="hasil" class="mt-6 text-sm leading-relaxed text-justify"></div>
    </main>

    <script>
        document.getElementById('btn').addEventListener('click', async () => {
            const tema = document.getElementById('tema').value;
            const hasil = document.getElementById('hasil');
            hasil.innerHTML = "Menyusun khutbah...";
            
            // Masukkan URL JEMBATAN Anda di bawah ini
            const urlJembatan = "https://script.google.com/macros/s/AKfycbxUDSy_AVCjESvruMvsQMbzgL_ptPw46UGppI8WFwDxHs5NvH0qYqSiuh9hYAMwB0BLYw/exec";
            
            const resp = await fetch("URL_JEMBATAN_ANDA_DI_SINI", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ tema: tema })
});
            const data = await resp.json();
            hasil.innerHTML = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
        });
    </script>
</body>
</html>
